<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautiQ - Admin</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #ffffff; }
    .navbar-brand { color: #A78BFA !important; font-weight: bold; }
    .nav-link { color: #6b7280 !important; cursor: pointer; }
    .nav-link:hover { color: #A78BFA !important; }
    .btn-pink { background-color: #FBCFE8; color: #1F2937; font-weight: 600; }
    .btn-pink:hover { background-color: #F9A8D4; }
    .text-lila { color: #A78BFA; }
    .card-title { color: #A78BFA; font-weight: bold; }
  </style>
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">BeautiQ Admin</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" onclick="mostrarExplorar()">Explorar</a></li>
        <li class="nav-item"><a class="nav-link" onclick="mostrarHistorial()">Historial</a></li>
        <li class="nav-item"><a class="nav-link" onclick="mostrarOfertas()">Mis Ofertas</a></li>
        <li class="nav-item"><button class="btn btn-outline-danger" onclick="cerrarSesion()">Cerrar sesión</button></li>
      </ul>
    </div>
  </nav>

  <!-- Sección Explorar -->
  <div id="explorarSection" class="container mt-4">
    <h2 class="text-lila mb-4">Explorar Servicios</h2>
    <p class="text-muted">Aquí se mostrarán las ofertas creadas por los profesionales.</p>
  </div>

  <!-- Sección Historial -->
  <div id="historialSection" class="container mt-4" style="display:none;">
    <h2 class="text-lila mb-4">Historial de Citas</h2>
    <p class="text-muted">Aquí el administrador puede revisar las citas y comprobantes.</p>
  </div>

  <!-- Sección Mis Ofertas -->
  <div id="ofertasSection" class="container mt-4" style="display:none;">
    <h2 class="text-lila mb-4">Crear Oferta Profesional</h2>
    <form id="formOferta">
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" placeholder="Ejemplo: María González" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Especialidad</label>
        <input type="text" class="form-control" placeholder="Ejemplo: Peluquería y Maquillaje" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Ubicación</label>
        <input type="text" class="form-control" placeholder="Ejemplo: Centro" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Reseñas</label>
        <input type="text" class="form-control" placeholder="Ejemplo: 4.8 (32 reseñas)">
      </div>
      <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="text" class="form-control" placeholder="Ejemplo: $50/hora" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Sobre el profesional</label>
        <textarea class="form-control" placeholder="Describe tu experiencia y compromiso..." required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Disponibilidad</label>
        <input type="text" class="form-control" placeholder="Ejemplo: Lunes a Viernes: 9:00 - 18:00" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Servicios ofrecidos</label>
        <textarea class="form-control" placeholder="Ejemplo: Servicio básico - $50/hora, Servicio premium - $70/hora..." required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Foto (URL)</label>
        <input type="url" class="form-control" placeholder="Pega aquí el enlace de tu foto" required>
      </div>
      <button type="submit" class="btn btn-pink">Crear Oferta</button>
    </form>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  // Guardar oferta en LocalStorage
  function guardarOferta(oferta) {
    let ofertas = JSON.parse(localStorage.getItem("ofertas")) || [];
    ofertas.push(oferta);
    localStorage.setItem("ofertas", JSON.stringify(ofertas));
  }

  // Mostrar ofertas en la sección Explorar
  function mostrarOfertasExplorar() {
    const explorar = document.getElementById("explorarSection");
    explorar.innerHTML = '<h2 class="text-lila mb-4">Explorar Servicios</h2>';
    let ofertas = JSON.parse(localStorage.getItem("ofertas")) || [];
    if(ofertas.length === 0){
      explorar.innerHTML += '<p class="text-muted">No hay ofertas creadas aún.</p>';
    } else {
      const row = document.createElement("div");
      row.className = "row";
      ofertas.forEach((o, index) => {
        const col = document.createElement("div");
        col.className = "col-md-4 mb-4";
        col.innerHTML = `
          <div class="card shadow-sm">
            <img src="${o.foto}" class="card-img-top" alt="${o.nombre}">
            <div class="card-body">
              <h5 class="card-title">${o.nombre}</h5>
              <p class="card-text">${o.especialidad}</p>
              <p class="text-muted">Ubicación: ${o.ubicacion}</p>
              <p class="fw-bold">${o.precio}</p>
              <p class="text-muted">Reseñas: ${o.reseñas}</p>
              <button class="btn btn-sm btn-danger mt-2" onclick="eliminarOferta(${index})">Eliminar</button>
            </div>
          </div>`;
        row.appendChild(col);
      });
      explorar.appendChild(row);
    }
  }
function mostrarHistorialAdmin() {
  const historial = document.getElementById("historialSection");
  historial.innerHTML = '<h2 class="text-lila mb-4">Historial de Citas</h2>';
  let citas = JSON.parse(localStorage.getItem("citas")) || [];
  if(citas.length === 0){
    historial.innerHTML += '<p class="text-muted">No hay citas registradas aún.</p>';
  } else {
    citas.forEach(c => {
      const card = document.createElement("div");
      card.className = "card shadow-sm mb-3";
      card.innerHTML = `
        <div class="card-body">
          <h5 class="card-title">${c.nombre}</h5>
          <p class="card-text">Servicio: ${c.servicio}</p>
          <p class="card-text">Fecha: ${c.fecha}</p>
          <p class="card-text">Hora: ${c.hora}</p>
          <p class="card-text">Precio: ${c.precio}</p>
          <p class="estado-confirmado">Estado: ${c.estado}</p>
          ${c.comprobante ? `<p class="text-muted">Comprobante: ${c.comprobante}</p>` : `<p class="text-muted">Comprobante pendiente</p>`}
        </div>`;
      historial.appendChild(card);
    });
  }
}

  // Eliminar oferta
  function eliminarOferta(index) {
    let ofertas = JSON.parse(localStorage.getItem("ofertas")) || [];
    ofertas.splice(index, 1);
    localStorage.setItem("ofertas", JSON.stringify(ofertas));
    mostrarOfertasExplorar();
  }

  // Manejo del formulario de ofertas
  document.getElementById("formOferta").addEventListener("submit", function(e){
    e.preventDefault();
    const oferta = {
      nombre: this[0].value,
      especialidad: this[1].value,
      ubicacion: this[2].value,
      reseñas: this[3].value,
      precio: this[4].value,
      sobre: this[5].value,
      disponibilidad: this[6].value,
      servicios: this[7].value,
      foto: this[8].value
    };
    guardarOferta(oferta);
    alert("Oferta creada correctamente");
    mostrarExplorar();
    this.reset(); // limpiar formulario
  });

  // Funciones de navegación
  function mostrarExplorar() {
    document.getElementById("explorarSection").style.display = "block";
    document.getElementById("historialSection").style.display = "none";
    document.getElementById("ofertasSection").style.display = "none";
    mostrarOfertasExplorar();
  }

  function mostrarHistorial() {
  document.getElementById("explorarSection").style.display = "none";
  document.getElementById("historialSection").style.display = "block";
  document.getElementById("ofertasSection").style.display = "none";
  mostrarHistorialAdmin(); // aquí se cargan las citas guardadas
}

  function mostrarOfertas() {
    document.getElementById("explorarSection").style.display = "none";
    document.getElementById("historialSection").style.display = "none";
    document.getElementById("ofertasSection").style.display = "block";
  }

  function cerrarSesion() {
    alert("Sesión cerrada");
    window.location.href = "index.html";
  }

  // Inicializar al cargar
  window.onload = mostrarExplorar;
</script>


  </script>
</body>
</html>
