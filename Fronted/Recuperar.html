<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BeautiQ - Recuperar Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #ffffff; }
    .card-recuperar {
      max-width: 420px;
      margin: auto;
      margin-top: 8%;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .btn-beautiq {
      background-color: #FBCFE8;
      color: #1F2937;
      font-weight: 600;
    }
    .btn-beautiq:hover { background-color: #F9A8D4; }
    .text-lila { color: #A78BFA; }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4 card-recuperar">
    <h1 class="text-lila mb-4 text-center fw-bold">Recuperar Contraseña</h1>

    <form id="recuperarForm">
      <div class="mb-3">
        <label for="correo" class="form-label text-lila">Correo electrónico</label>
        <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com" required />
      </div>
      <button type="submit" class="btn btn-beautiq w-100 mb-2">Restablecer contraseña</button>
      <a href="index.html" class="btn btn-secondary w-100">Volver al inicio de sesión</a>
    </form>

    <p id="mensajeRecuperar" class="mt-3 text-center"></p>
  </div>

  <!-- Script -->
  <script>
    document.getElementById("recuperarForm").addEventListener("submit", function(e){
      e.preventDefault();
      const correo = document.getElementById("correo").value.trim();
      const mensaje = document.getElementById("mensajeRecuperar");

      if(correo){
        // Simulación de envío de enlace
        mensaje.textContent = "Se ha enviado un enlace de recuperación a " + correo;
        mensaje.style.color = "green";
      } else {
        mensaje.textContent = "Por favor ingresa tu correo.";
        mensaje.style.color = "red";
      }
    });
  </script>
</body>
</html>
