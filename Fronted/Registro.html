<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BeautiQ - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-beautiq { background-color: #FBCFE8; color: #1F2937; font-weight: 600; }
    .btn-beautiq:hover { background-color: #F9A8D4; }
    .text-lila { color: #A78BFA; }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width:420px;">
      <h3 class="text-center text-lila mb-4">BeautiQ – Registro</h3>
      <form id="registroForm">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" id="nombre" class="form-control" placeholder="Juan Pérez" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="tel" id="telefono" class="form-control" placeholder="+57 300 123 4567" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Tipo de usuario</label>
          <select id="role" class="form-select" required>
            <option value="">Selecciona...</option>
            <option value="cliente">Cliente</option>
            <option value="profesional">Profesional</option>
          </select>
        </div>
        <button type="submit" class="btn btn-beautiq w-100">Registrar</button>
      </form>
      <div class="text-center mt-3">
        <a href="index.html" class="text-muted">Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("registroForm").addEventListener("submit", function(e){
      e.preventDefault();

      const nombre = document.getElementById("nombre").value.trim();
      const correo = document.getElementById("correo").value.trim();
      const telefono = document.getElementById("telefono").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const role = document.getElementById("role").value;

      if(password !== confirmPassword){
        alert("Las contraseñas no coinciden");
        return;
      }

      // Guardar usuario en LocalStorage
      let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
      usuarios.push({ nombre, correo, telefono, password, role });
      localStorage.setItem("usuarios", JSON.stringify(usuarios));

      alert("Cuenta creada correctamente");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
