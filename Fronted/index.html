<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautiQ - Iniciar Sesión</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #ffffff;
    }
    .login-card {
      max-width: 420px;
      margin: auto;
      margin-top: 8%;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }
    .logo {
      max-height: 70px;
    }
    .btn-beautiq {
      background-color: #FBCFE8;
      color: #1F2937;
      font-weight: 600;
    }
    .btn-beautiq:hover {
      background-color: #F9A8D4;
    }
    .text-lila {
      color: #A78BFA;
    }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4 login-card">
    <h1 class="text-lila mb-4 text-center fw-bold">BeautiQ – Iniciar Sesión</h1>

    <form id="loginForm">
      <!-- Correo -->
      <div class="mb-3">
        <label for="email" class="form-label text-lila">Correo electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required />
      </div>

      <!-- Contraseña -->
      <div class="mb-3">
        <label for="password" class="form-label text-lila">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="*******" required />
      </div>

      <!-- Rol -->
      <div class="mb-3">
        <label class="form-label text-lila">Tipo de usuario</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="role" id="cliente" value="cliente" checked>
          <label class="form-check-label text-lila" for="cliente">Cliente</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="role" id="profesional" value="profesional">
          <label class="form-check-label text-lila" for="profesional">Profesional</label>
        </div>
      </div>

      <!-- Botón -->
      <button type="submit" class="btn btn-beautiq w-100">Ingresar</button>

      <!-- Opciones extra -->
      <div class="text-center mt-3">
  <a href="Registro.html" class="text-lila text-decoration-none">¿No tienes cuenta? Regístrate</a><br>
  <a href="Recuperar.html" class="text-muted text-decoration-none">¿Olvidaste tu contraseña?</a>
</div>

    </form>

    <p id="mensajeBienvenida" class="mt-3 text-center"></p>
  </div>

  <!-- Script integrado -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const loginForm = document.getElementById("loginForm");
    const mensaje = document.getElementById("mensajeBienvenida");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const correo = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const role = document.querySelector("input[name='role']:checked").value;

      try {
        const res = await fetch("https://beautiq-hf9u.onrender.com/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ correo, password, role })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem("usuarioActivo", correo);

          // Redirigir según rol
          if (role === "cliente") {
            window.location.href = "menu.html";
          } else if (role === "profesional") {
            window.location.href = "admin.html";
          }
        } else {
          mensaje.textContent = data.message || "Credenciales inválidas";
          mensaje.style.color = "red";
        }
      } catch (error) {
        mensaje.textContent = "Error de conexión con el servidor.";
        mensaje.style.color = "red";
        console.error(error);
      }
    });
  });
</script>



</body>
</html>
